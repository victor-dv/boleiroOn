spring.application.name=boleiroOn
server.port=${SERVER_PORT}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

security.token.secret.user=${SECURITY_TOKEN_SECRET}
security.token.expiration-hours=${TOKEN_EXPIRATION_HOURS}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

app.admin.default-email=${ADMIN_EMAIL}
app.admin.default-login=${ADMIN_LOGIN}
app.admin.default-password=${ADMIN_PASSWORD}